<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Banque RP</title>

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/js/dashboard.js"></script>
</head>

<body>

<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-header">
      <h2>Banque RP</h2>
    </div>

    <nav class="sidebar-nav">
      <a href="/dashboard.html" class="active">Dashboard</a>
      <a href="/transfer.html">Virement</a>
      <a href="/history.html">Historique</a>
      <a href="/search.html">Recherche</a>
      <a href="/tpe.html" id="tpeLink">TPE</a>
      <a href="/employee.html" id="employeeLink">Employé</a>
      <a href="/admin.html" id="adminLink">Admin</a>
      <a href="/profile.html">Profil</a>
    </nav>

    <div class="sidebar-footer">
      <button onclick="API.auth.logout().then(()=>location.href='/login.html')">
        Déconnexion
      </button>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main-content">

    <!-- TOPBAR -->
    <header class="topbar">

      <h1>Dashboard</h1>

      <div class="topbar-actions">
        <button onclick="toggleTheme()">🌓</button>

        <div class="notifications">
          <button id="notifBtn">🔔</button>
          <span id="notifBadge" class="badge"></span>

          <div id="notifPanel" class="notif-panel"></div>
        </div>

      </div>

    </header>

    <!-- CONTENT -->
    <section class="page-content">

      <!-- SOLDE -->
      <div class="balance-card">
        <h2>Solde</h2>
        <div class="balance-amount" id="balance">0 €</div>
        <div class="iban" id="iban">IBAN</div>

        <a class="btn primary" href="/transfer.html">
          Faire un virement
        </a>
      </div>

      <!-- STATS -->
      <div class="stats-grid">

        <div class="stat-card">
          <h3>Reçus</h3>
          <div id="received30d">0 €</div>
        </div>

        <div class="stat-card">
          <h3>Envoyés</h3>
          <div id="sent30d">0 €</div>
        </div>

        <div class="stat-card">
          <h3>Transactions</h3>
          <div id="tx30d">0</div>
        </div>

      </div>

      <!-- CHART -->
      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>

      <!-- TRANSACTIONS -->
      <div class="card">
        <h3>Dernières transactions</h3>
        <div id="lastTransactions"></div>
      </div>

    </section>

  </main>

</div>

</body>
</html>
