<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription - Banque RP</title>

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/auth.css" />

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</head>

<body>
  <div class="auth-page">

    <div class="auth-container auth-container-wide">

      <div class="auth-header">
        <h1>Banque RP</h1>
        <p>Créer un nouveau compte</p>
      </div>

      <div class="auth-card">

        <form id="registerForm">

          <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" name="username" required />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required />
          </div>

          <div class="form-group">
            <label>Nom affiché</label>
            <input type="text" name="displayName" required />
          </div>

          <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" name="password" id="password" required />
          </div>

          <div class="password-strength">
            <div class="password-strength-fill" id="strengthBar"></div>
          </div>

          <div class="form-group">
            <label>Confirmer mot de passe</label>
            <input type="password" name="confirmPassword" required />
          </div>

          <div class="auth-error" id="registerError"></div>

          <button type="submit" class="btn primary">Créer le compte</button>

        </form>

        <div class="auth-links">
          <a href="/login.html">Déjà un compte ? Se connecter</a>
        </div>

      </div>

      <div class="auth-disclaimer">
        Simulation bancaire RP — aucun argent réel
      </div>

    </div>

    <button class="theme-btn" onclick="toggleTheme()">🌓</button>

  </div>
</body>
</html>
